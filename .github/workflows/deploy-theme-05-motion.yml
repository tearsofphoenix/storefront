name: Deploy theme-05-motion storefront

on:
  push:
    branches:
      - theme-05-motion
    paths:
      - "apps/storefront/**"
      - "package.json"
      - ".github/workflows/deploy-theme-05-motion.yml"
  workflow_dispatch:

concurrency:
  group: deploy-theme-05-motion
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment:
      name: theme-05-motion
    defaults:
      run:
        shell: bash
        working-directory: apps/storefront
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_PRIMARY_DOMAIN: ${{ vars.VERCEL_PRIMARY_DOMAIN }}
      VERCEL_ADDITIONAL_DOMAINS: ${{ vars.VERCEL_ADDITIONAL_DOMAINS }}
      VERCEL_CLI_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Validate Vercel configuration
        run: |
          set -euo pipefail
          [[ -n "$VERCEL_TOKEN" ]] || { echo "Missing VERCEL_TOKEN secret"; exit 1; }
          [[ -n "$VERCEL_ORG_ID" ]] || { echo "Missing VERCEL_ORG_ID secret"; exit 1; }
          [[ -n "$VERCEL_PROJECT_ID" ]] || { echo "Missing VERCEL_PROJECT_ID variable in GitHub environment theme-05-motion"; exit 1; }
          [[ -n "$VERCEL_PRIMARY_DOMAIN" ]] || { echo "Missing VERCEL_PRIMARY_DOMAIN variable in GitHub environment theme-05-motion"; exit 1; }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint storefront
        run: bun run lint

      - name: Pull Vercel environment
        run: bunx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build Vercel artifacts
        run: bunx vercel@latest build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt artifacts
        id: deploy
        run: |
          set -euo pipefail
          deployment_url="$(bunx vercel@latest deploy --prebuilt --prod --token "$VERCEL_TOKEN" 2>&1 | grep -Eo 'https?://[^ ]+' | tail -n 1)"
          [[ -n "$deployment_url" ]] || { echo "Failed to capture deployment URL"; exit 1; }
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $deployment_url"

      - name: Alias primary domain
        run: bunx vercel@latest alias set "${{ steps.deploy.outputs.deployment_url }}" "$VERCEL_PRIMARY_DOMAIN" --token "$VERCEL_TOKEN"

      - name: Alias additional domains
        if: ${{ vars.VERCEL_ADDITIONAL_DOMAINS != '' }}
        run: |
          set -euo pipefail
          IFS=',' read -ra domains <<< "$VERCEL_ADDITIONAL_DOMAINS"
          for domain in "${domains[@]}"; do
            domain="$(echo "$domain" | xargs)"
            [[ -z "$domain" ]] && continue
            bunx vercel@latest alias set "${{ steps.deploy.outputs.deployment_url }}" "$domain" --token "$VERCEL_TOKEN"
          done
